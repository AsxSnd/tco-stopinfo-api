# Copy to config.yaml (local) or /etc/tco-stopinfo-api/config.yaml (Linux).

http:
  host: "0.0.0.0"
  port: 8084
  workers: 1
  log_level: "info"

mqtt:
  broker: "mqtt.example.com"
  port: 1883
  tls: false
  # username: ""
  # password: ""
  client_id: "tco-stopinfo-api"
  reconnect_seconds: 5

  # Vilnius broker tree: vilniustest/{vehicle_id}/pis/0/journey
  root: "vilniustest"
  topic_prefix: "pis"
  pis_instance: "0"

cache:
  fast_response_seconds: 10
  vehicle_ttl_seconds: 7200
  http_cache_max_age: 30
  journey_stopinfo_ttl_seconds: 30
  # On-demand MQTT read when a vehicle has no cached topics (no active trip).
  mqtt_fetch_cooldown_seconds: 30
  mqtt_fetch_connect_seconds: 0.5
  mqtt_fetch_wait_seconds: 0.35

accounts:
  vilnius:
    base_language: "lt"
    timezone: "Europe/Vilnius"
    max_following_stops: 5
    max_connections_per_stop: 3
    fs_connection_mode: "compact"
    # When no MQTT OM data is available, inject these messages for display testing.
    inject_example_om_when_empty: true
    example_om_messages:
      - message_type: 2
        heading: "Eismo informacija"
        detail: "Bandomasis pranešimas ekranų testavimui."
        heading_multilanguage:
          lt: "Eismo informacija"
          en: "Traffic information"
        detail_multilanguage:
          lt: "Bandomasis pranešimas ekranų testavimui."
          en: "Sample message for display testing."
      - message_type: 2
        heading: "Planuojami darbai"
        detail: "Gatvės remonto darbai gali sukelti vėlavimų."
        heading_multilanguage:
          lt: "Planuojami darbai"
          en: "Planned works"
        detail_multilanguage:
          lt: "Gatvės remonto darbai gali sukelti vėlavimų."
          en: "Road works may cause delays."
