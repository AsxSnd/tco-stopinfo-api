# Copy to /etc/tco-stopinfo-api/config.yaml on the server.

http:
  host: "0.0.0.0"
  port: 8084
  workers: 1
  log_level: "info"

mqtt:
  broker: "mqtt.example.com"
  port: 1883
  tls: false
  # username: ""
  # password: ""
  client_id: "tco-stopinfo-api"
  reconnect_seconds: 5

  # --- Topic layout (read docs/mqtt-topic-layout.md) ---
  #
  # Vilnius-style broker tree:
  #   vilniustest/{vehicle_id}/pis/0/journey
  #   vilniustest/{vehicle_id}/pis/0/linkprogress
  #   vilniustest/{vehicle_id}/pis/0/list/stops
  #   ...
  root: "vilniustest"
  topic_prefix: "pis"
  pis_instance: "0"

  # Legacy flat layout (leave root empty):
  #   pis/{vehicle_id}/journey
  # root: ""

cache:
  fast_response_seconds: 10
  vehicle_ttl_seconds: 7200
  http_cache_max_age: 30

accounts:
  hsl:
    base_language: "fi"
    max_following_stops: 5
    max_connections_per_stop: 3
    fs_connection_mode: "compact"
